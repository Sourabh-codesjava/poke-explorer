<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poke Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Poke Explorer</h1>

        <div class="search-box">
            <input
                type="text"
                id="pokemon-input"
                placeholder="Enter Pokemon name"
            >
            <button id="search-btn">Search</button>
        </div>

        <div class="pokemon-card">
            <img id="pokemon-img" src="" alt="">
            <h2 id="pokemon-name">Pokemon Name</h2>
            <p id="pokemon-type">Type</p>
            <p id="pokemon-height">Height</p>
            <p id="pokemon-weight">Weight</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
